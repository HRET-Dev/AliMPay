services:
  alimpay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alimpay
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      TZ: Asia/Shanghai
      APP_PORT: 8080
    volumes:
      - ./config:/var/www/html/config
      - ./data:/var/www/html/data
      - ./logs:/var/www/html/logs
      - ./qrcode:/var/www/html/qrcode
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health.php?action=status >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

